services:
  postgres:
    image: postgres:16-alpine
    container_name: psp-gsp-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_secret
      POSTGRES_DB: psp_gsp
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d psp_gsp']
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata: